name: Ops Check

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  themes:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint themes (strict)
        run: npm run lint:themes:strict

      - name: Check theme categories
        run: npm run categories:check

      - name: Theme immersion check
        run: npm run themes:immersion

  agents:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check agent contracts (strict)
        run: npm run agents:check:strict

      - name: Delegation smoke check
        run: npm run agents:smoke

  readme-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check README theme sync
        run: npm run readme:check
