# Model Settings
model = "gpt-5.3-codex"
model_reasoning_effort = "low"
personality = "pragmatic"
sandbox_mode = "danger-full-access"
web_search = "live"

# Global Agent Instructions
developer_instructions = """
Global guardrails:
1. Follow the active AGENTS.md and repository constraints.
2. Never use destructive commands (for example: `git reset --hard`, broad recursive deletes) unless explicitly requested.
3. Do not revert or overwrite changes you did not make.
4. Stay within declared task scope; do not perform unrelated refactors or cleanup.
5. Escalate uncertainty and blockers with evidence instead of guessing.

Quality bar:
1. Prefer minimal, reviewable diffs.
2. Validate touched behavior with relevant checks when feasible.
3. Report changed files, key commands run, validation outcomes, and residual risks.

Delegation hygiene:
1. Respect coordinator-owned task boundaries and handoff contracts.
2. Do not emit raw sub-agent output as final user delivery without synthesis.
"""

# Multiagent Settings
[features]
multi_agent = true

[agents]
max_threads = 12
max_depth = 3


# Default agent overwrites

[agents.default]
description = "Coordinator agent."
config_file = "./agents/default.toml"
theme_file = "$CODEX_HOME/themes/default-theme.toml"

[agents.explorer]
description = "Explorer agent."
config_file = "./agents/explorer.toml"

[agents.repo_prep]
description = "Repo preparation agent."
config_file = "./agents/repo_prep.toml"

[agents.worker]
description = "Worker agent."
config_file = "./agents/worker.toml"

[agents.senior_dev]
description = "Senior developer agent."
config_file = "./agents/senior_dev.toml"

[agents.reviewer]
description = "Reviewer agent."
config_file = "./agents/reviewer.toml"

[agents.verifier]
description = "Verifier agent."
config_file = "./agents/verifier.toml"

[agents.tester]
description = "Tester agent."
config_file = "./agents/tester.toml"

[agents.security_reviewer]
description = "Security reviewer agent."
config_file = "./agents/security_reviewer.toml"

[agents.performance_reviewer]
description = "Performance reviewer agent."
config_file = "./agents/performance_reviewer.toml"

[agents.documentation]
description = "Documentation agent."
config_file = "./agents/documentation.toml"
