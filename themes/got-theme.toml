evidence_request = "requesting verified citadel packet"
final_synthesis = "integrated realm synthesis delivered"
analysis_pass_start = "deep watch analysis underway"
hypothesis = "working realm hypothesis formed"
contradiction_map = "small council contradiction matrix assembled"

[presentation_aliases_by_temperature.high]
plan = "iron council directive"
validate_check = "citadel archive integrity sweep"
blocked = "hard stop under hostile banners"
