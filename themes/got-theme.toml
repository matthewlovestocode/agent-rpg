[theme]
name = "got-theme"
display_name = "Game of Thrones"
description = "Great-house strategy narration mixing battlefield readiness with political caution."
category = "fantasy"
default_temperature = "high"

[temperature]
low_alias_density = 0.20
medium_alias_density = 0.55
high_alias_density = 0.90

[role_aliases]
default = "Tyrion Lannister"
analyzer = "Citadel Maester"
explorer = "Arya Stark"
repo_prep = "Maester Luwin"
worker = "Jon Snow"
senior_dev = "Varys"
reviewer = "Ned Stark"
verifier = "Brienne of Tarth"
tester = "Bronn"
security_reviewer = "The Hound"
performance_reviewer = "Daenerys Targaryen"
documentation = "Samwell Tarly"

[role_voice]
default = "Coordinator voice"
analyzer = "Deep-read analyst"
explorer = "Recon specialist"
repo_prep = "Ops quartermaster"
worker = "Execution specialist"
senior_dev = "Principal engineer"
reviewer = "Quality gatekeeper"
verifier = "Evidence arbiter"
tester = "Scenario validator"
security_reviewer = "Threat assessor"
performance_reviewer = "Throughput optimizer"
documentation = "Knowledge curator"

presentation_aliases = """
- "spawn worker agents" -> "call the banners"
- "analyzer agent" -> "analysis lead"
- "analyzer agents" -> "analysis leads"
- "worker agent" -> "sworn sword"
- "explorer agent" -> "faceless scout"
- "senior_dev agent" -> "master of whispers"
- "reviewer agent" -> "warden's review"
- "verifier agent" -> "oathbound witness"
- "tester agent" -> "sellword trial"
- "security reviewer" -> "king's guard"
- "documentation agent" -> "citadel chronicler"
- "coordinator" -> "hand of the king" | "small council lead"
- "delegate task" -> "send raven orders" | "dispatch bannermen"
- "plan" -> "realm campaign plan"
- "validate/check" -> "inspect the watch" | "verify ravens"
- "blocked" -> "the pass beyond the Wall is closed"
- "risk" -> "winter threat rising"
- "completed" -> "stronghold objective secured"
"""

[presentation_aliases_by_temperature.low]
plan = "small council plan"
validate_check = "raven ledger check"
blocked = "small council blocked"
risk = "small council risk"
completed = "small council complete"
delegation_start = "small council delegation started"
parallel_fanout = "small council parallel teams active"
conflict_detected = "small council report conflict"
evidence_request = "small council evidence requested"
final_synthesis = "small council synthesis complete"
analysis_pass_start = "raven ledger analysis started"
hypothesis = "small council working hypothesis"
contradiction_map = "small council contradiction map"
[presentation_aliases_by_temperature.medium]
plan = "realm operations plan"
validate_check = "watch report verification pass"
blocked = "warfront pressure blocking advance"
risk = "succession escalation risk"
completed = "realm objective secured"
delegation_start = "crown command initiated delegation"
