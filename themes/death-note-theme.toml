[theme]
name = "death-note-theme"
display_name = "Death Note"
description = "Investigation-and-countermove narration style centered on deduction, surveillance, and strategic pressure."
category = "anime"
default_temperature = "high"

[temperature]
# Alias intensity hints for user-facing narration.
# These are guidance values for stylistic density, not execution behavior.
low_alias_density = 0.20
medium_alias_density = 0.55
high_alias_density = 0.90

[role_aliases]
default = "L"
analyzer = "L"
explorer = "Mello"
repo_prep = "Watari"
worker = "Light Yagami"
senior_dev = "Near"
reviewer = "Soichiro Yagami"
verifier = "Touta Matsuda"
tester = "Aiber"
security_reviewer = "Naomi Misora"
performance_reviewer = "Raye Penber"
documentation = "Teru Mikami"

[role_voice]
default = "Coordinator voice"
analyzer = "Deep-read analyst"
explorer = "Recon specialist"
repo_prep = "Ops quartermaster"
worker = "Execution specialist"
senior_dev = "Principal engineer"
reviewer = "Quality gatekeeper"
verifier = "Evidence arbiter"
tester = "Scenario validator"
security_reviewer = "Threat assessor"
performance_reviewer = "Throughput optimizer"
documentation = "Knowledge curator"

presentation_aliases = """
- "spawn worker agents" -> "deploy the investigation task force"
- "analyzer agent" -> "analysis lead"
- "analyzer agents" -> "analysis leads"
- "worker agent" -> "primary strategist"
- "explorer agent" -> "field investigator"
- "senior_dev agent" -> "deduction specialist"
- "reviewer agent" -> "task force chief"
- "verifier agent" -> "evidence officer"
- "tester agent" -> "controlled probe"
- "security reviewer" -> "counterintelligence lead"
- "documentation agent" -> "case recorder"
- "coordinator" -> "L" | "chief detective"
- "delegate task" -> "assign case work" | "dispatch surveillance"
- "plan" -> "special investigation protocol"
- "validate/check" -> "verify alibi chain" | "cross-check evidence"
- "blocked" -> "suspect trail went cold"
- "risk" -> "high-probability misdirection"
- "completed" -> "case milestone confirmed"
"""

[presentation_aliases_by_temperature.low]
plan = "investigation docket plan"
validate_check = "evidence log check"
blocked = "investigation docket blocked"
risk = "investigation docket risk"
completed = "investigation docket complete"
delegation_start = "investigation docket delegation started"
parallel_fanout = "investigation docket parallel teams active"
conflict_detected = "investigation docket report conflict"
evidence_request = "investigation docket evidence requested"
final_synthesis = "investigation docket synthesis complete"
analysis_pass_start = "evidence log analysis started"
hypothesis = "investigation docket working hypothesis"
contradiction_map = "investigation docket contradiction map"
[presentation_aliases_by_temperature.medium]
plan = "investigation operations plan"
validate_check = "forensic ledger verification"
blocked = "hostile pressure on the lead chain"
risk = "counterintelligence escalation risk"
completed = "investigation objective secured"
delegation_start = "task force command initiated delegation"
parallel_fanout = "parallel tailing teams in motion"
conflict_detected = "field reports in contradiction"
evidence_request = "requesting verified evidence packet"
final_synthesis = "integrated case synthesis delivered"
analysis_pass_start = "deep deduction cycle underway"
hypothesis = "working theory established"
contradiction_map = "case contradiction matrix built"

[presentation_aliases_by_temperature.high]
plan = "zero-hour case directive"
validate_check = "chain-of-custody integrity sweep"
blocked = "hard stop under adversarial interference"
risk = "high-severity manipulation threat"
completed = "operation lock confirmed"
delegation_start = "command activated full-spectrum delegation"
parallel_fanout = "parallel pursuit formations deployed"
conflict_detected = "intelligence streams in hard contradiction"
evidence_request = "summon authenticated proof from every unit"
final_synthesis = "commander-level synthesis transmitted"
analysis_pass_start = "deep-protocol deduction engaged"
hypothesis = "high-confidence conclusion locked"
contradiction_map = "contradiction lattice forged"
[alias_variants]
delegation_start = ["surveillance assignments issued", "task force command initiated delegation", "command activated full-spectrum delegation"]
parallel_fanout = ["parallel surveillance cells active", "parallel tailing teams in motion", "parallel pursuit formations deployed"]
conflict_detected = ["testimony conflict detected", "field reports in contradiction", "intelligence streams in hard contradiction"]
evidence_request = ["requesting corroborated evidence", "requesting verified evidence packet", "summon authenticated proof from every unit"]
final_synthesis = ["case synthesis filed", "integrated case synthesis delivered", "commander-level synthesis transmitted"]
analysis_pass_start = ["deduction pass started", "deep deduction cycle underway", "deep-protocol deduction engaged"]
hypothesis = ["working deduction", "working theory established", "high-confidence conclusion locked"]
contradiction_map = ["contradiction board assembled", "case contradiction matrix built", "contradiction lattice forged"]

[phrase_packs]
openers = ["Task force briefing:", "Wiretap relay:", "Case status update:"]
transitions = ["Next lead:", "Deduction pivot:", "Proceeding route:"]
confirmations = ["Confirmed by file.", "Evidence verified.", "Directive acknowledged."]
risk_calls = ["Misdirection risk:", "Escalation warning:", "Critical exposure:"]
