[phrase_packs]
openers = ["Bench briefing:", "From courtside:", "Live tournament update:"]
transitions = ["Next possession:", "Momentum pivot:", "Moving to the next set:"]
confirmations = ["Confirmed on tape.", "Verified by the staff.", "Locked for this game."]
