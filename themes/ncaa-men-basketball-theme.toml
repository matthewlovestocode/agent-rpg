[theme]
name = "ncaa-men-basketball-theme"
display_name = "NCAA Men's Basketball"
description = "College hoops game-plan narration with scouting, rotations, and tournament urgency."
category = "sports"
default_temperature = "high"

[temperature]
low_alias_density = 0.20
medium_alias_density = 0.55
high_alias_density = 0.90

[role_aliases]
default = "Head Coach"
analyzer = "Analyst"
explorer = "Advance Scout"
repo_prep = "Equipment Manager"
worker = "Starting Guard"
senior_dev = "Offensive Coordinator"
reviewer = "Film Room Coach"
verifier = "Assistant Coach"
tester = "Practice Squad"
security_reviewer = "Defensive Coordinator"
performance_reviewer = "Strength Coach"
documentation = "Stats Analyst"

[role_voice]
default = "Coordinator voice"
analyzer = "Deep-read analyst"
explorer = "Recon specialist"
repo_prep = "Ops quartermaster"
worker = "Execution specialist"
senior_dev = "Principal engineer"
reviewer = "Quality gatekeeper"
verifier = "Evidence arbiter"
tester = "Scenario validator"
security_reviewer = "Threat assessor"
performance_reviewer = "Throughput optimizer"
documentation = "Knowledge curator"

presentation_aliases = """
- "spawn worker agents" -> "send in the starting five"
- "analyzer agent" -> "analysis lead"
- "analyzer agents" -> "analysis leads"
- "worker agent" -> "starter"
- "explorer agent" -> "advance scout"
- "senior_dev agent" -> "offensive coordinator"
- "reviewer agent" -> "film-room reviewer"
- "verifier agent" -> "assistant coach"
- "tester agent" -> "scrimmage unit"
- "security reviewer" -> "defensive coordinator"
- "documentation agent" -> "stat sheet analyst"
- "coordinator" -> "head coach"
- "delegate task" -> "call the play" | "send the rotation"
- "plan" -> "game plan"
- "validate/check" -> "review the tape" | "check box score trends"
- "blocked" -> "shot clock pressure"
- "risk" -> "turnover risk"
- "completed" -> "game secured"
"""

[presentation_aliases_by_temperature.low]
plan = "chalkboard game plan"
validate_check = "set execution check"
blocked = "chalkboard game blocked"
risk = "chalkboard game risk"
completed = "chalkboard game complete"
delegation_start = "chalkboard game delegation started"
parallel_fanout = "chalkboard game parallel teams active"
conflict_detected = "chalkboard game report conflict"
evidence_request = "chalkboard game evidence requested"
final_synthesis = "chalkboard game synthesis complete"
analysis_pass_start = "set execution analysis started"
hypothesis = "chalkboard game working hypothesis"
contradiction_map = "chalkboard game contradiction map"
[presentation_aliases_by_temperature.medium]
plan = "bench-led operational game plan"
validate_check = "full-court verification pass"
blocked = "defensive pressure is stalling progress"
risk = "foul-trouble escalation risk"
completed = "bench objective secured"
