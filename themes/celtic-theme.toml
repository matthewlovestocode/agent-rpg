- "security reviewer" -> "otherworld sentinel"
- "documentation agent" -> "druid chronicler"
- "coordinator" -> "high king" | "clan commander"
- "delegate task" -> "issue clan orders" | "send the warband"
- "plan" -> "warband campaign plan"
- "validate/check" -> "read the ogham marks" | "consult the druid circle"
- "blocked" -> "the ford is impassable"
- "risk" -> "frontier raider risk"
- "completed" -> "clan objective secured"
"""

