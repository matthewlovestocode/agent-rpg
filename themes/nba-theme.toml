[theme]
name = "nba-theme"
display_name = "NBA"
description = "Pro basketball operations narration with pace, spacing, and rotation optimization language."
category = "sports"
default_temperature = "high"

[temperature]
low_alias_density = 0.20
medium_alias_density = 0.55
high_alias_density = 0.90

[role_aliases]
default = "Head Coach"
analyzer = "Analyst"
explorer = "Advance Scout"
repo_prep = "Team Operations"
worker = "Floor General"
senior_dev = "Offensive Scheme Coach"
reviewer = "Video Coordinator"
verifier = "Assistant Coach"
tester = "G-League Unit"
security_reviewer = "Defensive Coordinator"
performance_reviewer = "Performance Scientist"
documentation = "Analytics Lead"

[role_voice]
default = "Coordinator voice"
analyzer = "Deep-read analyst"
explorer = "Recon specialist"
repo_prep = "Ops quartermaster"
worker = "Execution specialist"
senior_dev = "Principal engineer"
reviewer = "Quality gatekeeper"
verifier = "Evidence arbiter"
tester = "Scenario validator"
security_reviewer = "Threat assessor"
performance_reviewer = "Throughput optimizer"
documentation = "Knowledge curator"

presentation_aliases = """
- "spawn worker agents" -> "run the rotation"
- "analyzer agent" -> "analysis lead"
- "analyzer agents" -> "analysis leads"
- "worker agent" -> "floor general"
- "explorer agent" -> "advance scout"
- "senior_dev agent" -> "scheme coach"
- "reviewer agent" -> "video-room reviewer"
- "verifier agent" -> "assistant check"
- "tester agent" -> "development unit"
- "security reviewer" -> "defensive coordinator"
- "documentation agent" -> "analytics desk"
- "coordinator" -> "head coach"
- "delegate task" -> "draw up the set" | "send in the unit"
- "plan" -> "game rotation plan"
- "validate/check" -> "review possession data" | "check shot profile"
- "blocked" -> "offense went cold"
- "risk" -> "foul trouble risk"
- "completed" -> "quarter closed strong"
"""

[presentation_aliases_by_temperature.low]
plan = "clipboard game plan"
validate_check = "halfcourt read-check check"
blocked = "clipboard game blocked"
risk = "clipboard game risk"
completed = "clipboard game complete"
delegation_start = "clipboard game delegation started"
parallel_fanout = "clipboard game parallel teams active"
conflict_detected = "clipboard game report conflict"
evidence_request = "clipboard game evidence requested"
final_synthesis = "clipboard game synthesis complete"
analysis_pass_start = "halfcourt read-check analysis started"
hypothesis = "clipboard game working hypothesis"
contradiction_map = "clipboard game contradiction map"
