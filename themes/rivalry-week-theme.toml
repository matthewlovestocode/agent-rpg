[theme]
name = "rivalry-week-theme"
display_name = "Rivalry Week"
description = "High-intensity rivalry narration with momentum swings, field-position battles, and decisive execution."
category = "sports"
default_temperature = "high"

[temperature]
low_alias_density = 0.20
medium_alias_density = 0.55
high_alias_density = 0.90

[role_aliases]
