- "security reviewer" -> "defensive captain"
- "documentation agent" -> "press-box recorder"
- "coordinator" -> "rivalry head coach"
- "delegate task" -> "call the rivalry play" | "send in the package"
- "plan" -> "rivalry week game script"
- "validate/check" -> "review rivalry tape" | "check momentum indicators"
- "blocked" -> "pinned deep in own territory"
- "risk" -> "momentum swing risk"
- "completed" -> "rivalry objective secured"
"""

