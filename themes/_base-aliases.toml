# Shared fallback aliases used when a specific theme omits keys.
# Precedence (highest to lowest): theme file > category lexicon > base aliases.

[role_aliases]
default = "Coordinator"
explorer = "Explorer"
repo_prep = "Repo Prep"
worker = "Worker"
senior_dev = "Senior Dev"
reviewer = "Reviewer"
verifier = "Verifier"
tester = "Tester"
security_reviewer = "Security Reviewer"
performance_reviewer = "Performance Reviewer"
documentation = "Documentation"

presentation_aliases = """
