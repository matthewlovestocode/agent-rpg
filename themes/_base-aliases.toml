# Shared fallback aliases used when a specific theme omits keys.
# Precedence (highest to lowest): theme file > category lexicon > base aliases.

[role_aliases]
default = "Coordinator"
analyzer = "Analyzer"
explorer = "Explorer"
repo_prep = "Repo Prep"
worker = "Worker"
senior_dev = "Senior Dev"
reviewer = "Reviewer"
verifier = "Verifier"
tester = "Tester"
security_reviewer = "Security Reviewer"
performance_reviewer = "Performance Reviewer"
documentation = "Documentation"

presentation_aliases = """
- "spawn worker agents" -> "deploy the work squad"
- "worker agent" -> "worker"
- "worker agents" -> "workers"
- "analyzer agent" -> "analysis lead"
- "analyzer agents" -> "analysis leads"
- "explorer agent" -> "explorer"
- "explorer agents" -> "explorers"
- "repo_prep agent" -> "repo prep specialist"
- "repo_prep agents" -> "repo prep specialists"
- "senior_dev agent" -> "senior engineer"
- "senior_dev agents" -> "senior engineers"
- "reviewer agent" -> "review lead"
- "reviewer agents" -> "review leads"
- "verifier agent" -> "verification lead"
- "verifier agents" -> "verification leads"
- "tester agent" -> "test lead"
- "tester agents" -> "test leads"
- "security_reviewer agent" -> "security lead"
- "security_reviewer agents" -> "security leads"
- "performance_reviewer agent" -> "performance lead"
- "performance_reviewer agents" -> "performance leads"
- "documentation agent" -> "documentation lead"
- "documentation agents" -> "documentation leads"
- "coordinator" -> "coordinator"
- "delegate task" -> "assign the next objective"
- "plan" -> "operation plan"
- "validate/check" -> "run a validation pass"
- "blocked" -> "blocked"
- "risk" -> "risk"
- "completed" -> "completed"
- "delegation_start" -> "delegation sequence starting"
- "parallel_fanout" -> "parallel work lanes engaged"
- "conflict_detected" -> "conflicting findings detected"
- "evidence_request" -> "requesting evidence bundle"
- "final_synthesis" -> "final synthesis assembled"
- "analysis_pass_start" -> "deep analysis pass starting"
- "hypothesis" -> "working hypothesis"
- "contradiction_map" -> "contradiction map"
"""

[presentation_aliases_by_temperature.low]
plan = "plan"
validate_check = "check"
blocked = "blocked"
risk = "risk"
completed = "done"
delegation_start = "starting delegation"
parallel_fanout = "parallel tasks underway"
conflict_detected = "conflict detected"
evidence_request = "requesting evidence"
final_synthesis = "summary ready"
analysis_pass_start = "analysis starting"
hypothesis = "initial hypothesis"
contradiction_map = "conflict map"

[presentation_aliases_by_temperature.medium]
plan = "operation plan"
validate_check = "validation sweep"
blocked = "blocked by dependency"
risk = "delivery risk"
completed = "objective achieved"
delegation_start = "delegation sequence underway"
parallel_fanout = "parallel workstreams in motion"
conflict_detected = "cross-agent conflict detected"
evidence_request = "requesting focused evidence"
final_synthesis = "integrated synthesis ready"
analysis_pass_start = "analysis pass in progress"
hypothesis = "working hypothesis"
contradiction_map = "contradiction map compiled"

[presentation_aliases_by_temperature.high]
plan = "campaign operations plan"
validate_check = "integrity sweep"
blocked = "advance stalled at the gate"
risk = "threat vector"
completed = "objective secured"
delegation_start = "war council delegation has begun"
parallel_fanout = "multiple strike teams deployed in parallel"
conflict_detected = "reports are in contradiction"
evidence_request = "summon field proof"
final_synthesis = "campaign synthesis delivered"
analysis_pass_start = "deep analysis protocol engaged"
hypothesis = "battle hypothesis formed"
contradiction_map = "contradiction map charted"

[alias_variants]
delegation_start = ["delegation sequence starting", "initiating delegation wave", "opening task command"]
parallel_fanout = ["parallel work lanes engaged", "multiple workstreams now active", "simultaneous task groups deployed"]
conflict_detected = ["conflicting findings detected", "findings are in conflict", "agent reports diverge"]
evidence_request = ["requesting evidence bundle", "collecting proof points", "asking for command logs"]
final_synthesis = ["final synthesis assembled", "integrated summary complete", "decision brief finalized"]
analysis_pass_start = ["deep analysis pass starting", "starting full-context read", "launching synthesis pass"]
hypothesis = ["working hypothesis", "initial theory", "provisional interpretation"]
contradiction_map = ["contradiction map", "conflict matrix", "dispute map"]

[phrase_packs]
openers = ["Status update:", "Progress report:", "Command brief:"]
transitions = ["Next:", "Then:", "After that:"]
confirmations = ["Confirmed.", "Verified.", "Acknowledged."]
risk_calls = ["Risk noted:", "Caution:", "Threat alert:"]
