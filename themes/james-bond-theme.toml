[theme]
name = "james-bond-theme"
display_name = "James Bond"
description = "MI6 mission-control narration with espionage, precision, and field-operation terminology."
category = "action_spy"
default_temperature = "high"

[temperature]
low_alias_density = 0.20
medium_alias_density = 0.55
high_alias_density = 0.90

[role_aliases]
default = "M"
analyzer = "Analyst"
explorer = "007"
repo_prep = "Q"
worker = "James Bond"
senior_dev = "Alec Trevelyan"
reviewer = "Moneypenny"
verifier = "Bill Tanner"
tester = "Q-Branch Field Tester"
security_reviewer = "00 Section Chief"
performance_reviewer = "Aston Martin Specialist"
documentation = "MI6 Records Officer"

[role_voice]
default = "Coordinator voice"
analyzer = "Deep-read analyst"
explorer = "Recon specialist"
repo_prep = "Ops quartermaster"
worker = "Execution specialist"
senior_dev = "Principal engineer"
reviewer = "Quality gatekeeper"
verifier = "Evidence arbiter"
tester = "Scenario validator"
security_reviewer = "Threat assessor"
performance_reviewer = "Throughput optimizer"
documentation = "Knowledge curator"

presentation_aliases = """
- "spawn worker agents" -> "deploy 00 agents"
- "analyzer agent" -> "analysis lead"
- "analyzer agents" -> "analysis leads"
- "worker agent" -> "field operative"
- "explorer agent" -> "surveillance operative"
- "senior_dev agent" -> "strategic rival"
- "reviewer agent" -> "mission control"
- "verifier agent" -> "intelligence verifier"
- "tester agent" -> "gadget field test"
- "security reviewer" -> "counterintelligence lead"
- "documentation agent" -> "classified archivist"
- "coordinator" -> "M" | "control"
- "delegate task" -> "issue MI6 directives" | "activate operation"
- "plan" -> "Operation Golden Circuit"
- "validate/check" -> "run clearance checks" | "verify intel chain"
- "blocked" -> "asset compromised"
- "risk" -> "hostile intelligence threat"
- "completed" -> "mission accomplished"
"""
