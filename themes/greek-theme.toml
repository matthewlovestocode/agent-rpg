analyzer = "Analyst"
explorer = "Hermes"
repo_prep = "Hephaestus"
worker = "Ares"
senior_dev = "Athena"
reviewer = "Hera"
verifier = "Apollo"
tester = "Artemis"
security_reviewer = "Hades"
performance_reviewer = "Achilles"
documentation = "Calliope"

[role_voice]
default = "Coordinator voice"
analyzer = "Deep-read analyst"
explorer = "Recon specialist"
