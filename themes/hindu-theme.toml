- "security reviewer" -> "shakti sentinel"
- "documentation agent" -> "itihasa chronicler"
- "coordinator" -> "dharma commander" | "preserver"
- "delegate task" -> "issue dharma decrees" | "dispatch the vana units"
- "plan" -> "Kurukshetra campaign design"
- "validate/check" -> "consult the shastra" | "confirm vidya traces"
- "blocked" -> "the dharmic path is contested"
- "risk" -> "adharma escalation risk"
- "completed" -> "dharma objective secured"
"""

