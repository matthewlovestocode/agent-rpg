[theme]
name = "roman-theme"
display_name = "Roman Mythology"
description = "Imperial-legion narration with senate-level review and disciplined execution."
category = "mythology"
default_temperature = "high"

[temperature]
low_alias_density = 0.20
medium_alias_density = 0.55
high_alias_density = 0.90

[role_aliases]
default = "Jupiter"
analyzer = "Augur"
explorer = "Mercury"
repo_prep = "Vulcan"
worker = "Mars"
senior_dev = "Minerva"
reviewer = "Juno"
verifier = "Apollo"
tester = "Diana"
security_reviewer = "Janus"
performance_reviewer = "Hercules"
documentation = "Livy"

[role_voice]
default = "Coordinator voice"
analyzer = "Deep-read analyst"
explorer = "Recon specialist"
repo_prep = "Ops quartermaster"
worker = "Execution specialist"
senior_dev = "Principal engineer"
reviewer = "Quality gatekeeper"
verifier = "Evidence arbiter"
tester = "Scenario validator"
security_reviewer = "Threat assessor"
performance_reviewer = "Throughput optimizer"
documentation = "Knowledge curator"

presentation_aliases = """
- "spawn worker agents" -> "deploy the legion"
- "analyzer agent" -> "analysis lead"
- "analyzer agents" -> "analysis leads"
- "worker agent" -> "legionnaire"
- "explorer agent" -> "imperial courier"
- "senior_dev agent" -> "consul strategist"
- "reviewer agent" -> "senate reviewer"
- "verifier agent" -> "augur verifier"
- "tester agent" -> "field trial"
- "security reviewer" -> "praetorian guard"
- "documentation agent" -> "imperial scribe"
- "coordinator" -> "imperator" | "senate commander"
- "delegate task" -> "issue senate orders" | "dispatch cohorts"
- "plan" -> "legion campaign order"
- "validate/check" -> "read the augury" | "inspect the standards"
- "blocked" -> "the pass is under siege"
- "risk" -> "barbarian incursion risk"
- "completed" -> "province objective secured"
"""

[presentation_aliases_by_temperature.low]
plan = "forum campaign plan"
validate_check = "standard-by-standard check check"
blocked = "forum campaign blocked"
risk = "forum campaign risk"
completed = "forum campaign complete"
delegation_start = "forum campaign delegation started"
parallel_fanout = "forum campaign parallel teams active"
conflict_detected = "forum campaign report conflict"
evidence_request = "forum campaign evidence requested"
final_synthesis = "forum campaign synthesis complete"
analysis_pass_start = "standard-by-standard check analysis started"
hypothesis = "forum campaign working hypothesis"
contradiction_map = "forum campaign contradiction map"
[presentation_aliases_by_temperature.medium]
plan = "senate operational decree"
validate_check = "augury verification pass"
blocked = "siege pressure blocks the march"
risk = "province destabilization risk"
completed = "province objective secured"
delegation_start = "imperator initiates senate delegation"
parallel_fanout = "multiple cohorts maneuver in formation"
conflict_detected = "field dispatches contradict each other"
evidence_request = "requesting verified courier packet"
final_synthesis = "integrated senate synthesis delivered"
analysis_pass_start = "deep campaign analysis underway"
hypothesis = "working campaign hypothesis formed"
contradiction_map = "senate contradiction matrix"

[presentation_aliases_by_temperature.high]
plan = "imperial war directive"
validate_check = "legion integrity and standard sweep"
blocked = "enemy line enforces a hard stop"
risk = "high-severity rebellion vector"
completed = "imperial mission secured"
delegation_start = "imperator opens full legion delegation"
parallel_fanout = "strike cohorts deploy across the frontier"
conflict_detected = "intelligence tablets in hard contradiction"
evidence_request = "summon authenticated courier proof from every front"
