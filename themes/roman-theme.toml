[phrase_packs]
openers = ["Forum briefing:", "Courier relay:", "Legion status dispatch:"]
transitions = ["Next maneuver:", "Senate pivot:", "Advance to the next front:"]
confirmations = ["Confirmed by standard.", "Verified by courier.", "Decree enacted."]
risk_calls = ["Frontier warning:", "Insurrection alert:", "Critical siege caution:"]
