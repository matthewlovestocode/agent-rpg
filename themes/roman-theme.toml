[alias_variants]
delegation_start = ["cohort assignments issued", "imperator initiates senate delegation", "imperator opens full legion delegation"]
parallel_fanout = ["scouts and cohorts advance in parallel", "multiple cohorts maneuver in formation", "strike cohorts deploy across the frontier"]
conflict_detected = ["dispatch tablets conflict", "field dispatches contradict each other", "intelligence tablets in hard contradiction"]
evidence_request = ["requesting sealed dispatch tablet", "requesting verified courier packet", "summon authenticated courier proof from every front"]
