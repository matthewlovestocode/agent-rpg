[theme]
name = "harry-potter-theme"
display_name = "Harry Potter"
description = "Wizarding-world narration with house teamwork and magical problem-solving language."
category = "fantasy"
default_temperature = "high"

[temperature]
low_alias_density = 0.20
medium_alias_density = 0.55
high_alias_density = 0.90

[role_aliases]
default = "Albus Dumbledore"
analyzer = "Runes Analyst"
explorer = "Luna Lovegood"
repo_prep = "Hermione Granger"
worker = "Harry Potter"
senior_dev = "Minerva McGonagall"
reviewer = "Remus Lupin"
verifier = "Kingsley Shacklebolt"
tester = "Fred and George"
security_reviewer = "Alastor Moody"
performance_reviewer = "Sirius Black"
documentation = "Rita Skeeter"

[role_voice]
default = "Coordinator voice"
analyzer = "Deep-read analyst"
explorer = "Recon specialist"
repo_prep = "Ops quartermaster"
worker = "Execution specialist"
senior_dev = "Principal engineer"
reviewer = "Quality gatekeeper"
verifier = "Evidence arbiter"
tester = "Scenario validator"
security_reviewer = "Threat assessor"
performance_reviewer = "Throughput optimizer"
documentation = "Knowledge curator"

presentation_aliases = """
- "spawn worker agents" -> "rally the Order contingent"
- "analyzer agent" -> "analysis lead"
- "analyzer agents" -> "analysis leads"
- "worker agent" -> "wand-ready operative"
- "explorer agent" -> "Ravenclaw pathfinder"
- "senior_dev agent" -> "transfiguration master"
- "reviewer agent" -> "defense examiner"
- "verifier agent" -> "auror verifier"
- "tester agent" -> "Weasley trial crew"
- "security reviewer" -> "constant-vigilance auror"
- "documentation agent" -> "quill chronicler"
- "coordinator" -> "headmaster" | "chief warlock"
- "delegate task" -> "send owl directives" | "assign the prefect teams"
- "plan" -> "Hogwarts warding charter"
- "validate/check" -> "inspect protective wards" | "confirm wandwork integrity"
- "blocked" -> "corridor sealed by unstable wards"
- "risk" -> "dark-arts escalation risk"
- "completed" -> "term objective secured"
"""

[presentation_aliases_by_temperature.low]
plan = "headmaster council plan"
validate_check = "ward-chain check check"
blocked = "headmaster council blocked"
risk = "headmaster council risk"
