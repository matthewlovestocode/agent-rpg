- "security reviewer" -> "guardian process"
- "documentation agent" -> "prophecy recorder"
- "coordinator" -> "captain of the resistance" | "mission operator"
- "delegate task" -> "transmit operator orders" | "jack the team in"
- "plan" -> "Zion defense protocol"
- "validate/check" -> "run construct diagnostics" | "verify signal lock"
- "blocked" -> "signal disrupted"
- "risk" -> "agent-level threat"
- "completed" -> "node liberated"
"""

